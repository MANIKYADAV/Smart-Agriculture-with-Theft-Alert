# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-BKM-5"
BBFILE_PATTERN_meta-BKM-5 = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-BKM-5 = "6"

LAYERDEPENDS_meta-BKM-5 = "core"
LAYERSERIES_COMPAT_meta-BKM-5 = "kirkstone"
